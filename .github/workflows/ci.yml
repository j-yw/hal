name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'sandbox*'
      - 'hal/sandbox*'
      - 'compound/sandbox*'
  pull_request:
    branches:
      - main
      - develop
      - 'sandbox*'
      - 'hal/sandbox*'
      - 'compound/sandbox*'

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run vet
        run: make vet

      - name: Run tests
        run: make test

      - name: Check CLI docs drift
        run: make docs-check

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          args: check

  sandbox-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for sandbox changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            sandbox:
              - '.github/workflows/ci.yml'
              - 'sandbox/**'
              - 'Makefile'
              - '.dockerignore'
              - 'go.mod'
              - 'go.sum'
              - 'main.go'
              - 'cmd/**'
              - 'internal/**'

      - name: Set up Docker Buildx
        if: steps.changes.outputs.sandbox == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        if: steps.changes.outputs.sandbox == 'true'
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('sandbox/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build sandbox image
        if: steps.changes.outputs.sandbox == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sandbox/Dockerfile
          platforms: linux/amd64
          tags: hal-sandbox:amd64
          push: false
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Run smoke tests
        if: steps.changes.outputs.sandbox == 'true'
        run: docker run --rm hal-sandbox:amd64 /test.sh

      - name: Move cache
        if: steps.changes.outputs.sandbox == 'true'
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  integration-test:
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
    steps:
      - uses: actions/checkout@v4

      - name: Check for integration test changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            integration:
              - '.github/workflows/ci.yml'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/**'
              - 'sandbox/**'
              - 'internal/sandbox/**'
              - 'internal/compound/**'
              - 'internal/template/**'

      - uses: actions/setup-go@v5
        if: steps.changes.outputs.integration == 'true'
        with:
          go-version-file: go.mod

      - name: Check Daytona integration secrets
        id: daytona_secrets
        if: steps.changes.outputs.integration == 'true'
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_SERVER_URL: ${{ secrets.DAYTONA_SERVER_URL }}
        run: |
          if [ -n "$DAYTONA_API_KEY" ] && [ -n "$DAYTONA_SERVER_URL" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping integration tests because Daytona secrets are not configured."
          fi

      - name: Run integration tests
        if: steps.changes.outputs.integration == 'true' && steps.daytona_secrets.outputs.available == 'true'
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_SERVER_URL: ${{ secrets.DAYTONA_SERVER_URL }}
        run: go test -tags=integration -v -timeout 30m ./cmd -run TestSandboxCommandIntegration

      - name: Run package integration tests
        if: steps.changes.outputs.integration == 'true' && steps.daytona_secrets.outputs.available == 'true'
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_SERVER_URL: ${{ secrets.DAYTONA_SERVER_URL }}
        run: go test -tags=integration -v -timeout 30m ./internal/sandbox/... ./internal/compound/...

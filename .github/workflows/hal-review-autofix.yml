name: HAL Review AutoFix

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: hal-review-autofix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review-autofix:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify Codex CLI
        run: codex --version

      - name: Build hal
        run: go build -o hal .

      - name: Resolve base branch ref
        id: base
        run: |
          set -euo pipefail
          base_branch="${{ github.event.pull_request.base.ref }}"
          resolved_ref=""

          if git rev-parse --verify --quiet "origin/${base_branch}^{commit}" > /dev/null; then
            resolved_ref="origin/${base_branch}"
          elif git rev-parse --verify --quiet "${base_branch}^{commit}" > /dev/null; then
            resolved_ref="${base_branch}"
          else
            git fetch --no-tags origin "refs/heads/${base_branch}:refs/remotes/origin/${base_branch}"
            if git rev-parse --verify --quiet "origin/${base_branch}^{commit}" > /dev/null; then
              resolved_ref="origin/${base_branch}"
            fi
          fi

          if [ -z "${resolved_ref}" ]; then
            echo "Base branch '${base_branch}' not found" >&2
            exit 1
          fi

          echo "ref=${resolved_ref}" >> "$GITHUB_OUTPUT"

      - name: Run hal review loop (10 iterations)
        run: ./hal review against "${{ steps.base.outputs.ref }}" 10 -e codex

      - name: Upload review loop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hal-review-loop-${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: |
            .hal/reports/review-loop-*.json
            .hal/reports/review-loop-*.md
          if-no-files-found: warn

      - name: Commit and push fixes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No fixes produced by hal review."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          # Never auto-commit workflow file edits from PR-driven runs.
          git reset -- .github/workflows || true
          if git diff --cached --quiet; then
            echo "Only workflow-file edits were produced; skipping commit."
            exit 0
          fi
          git commit -m "fix: hal review autofixes for PR #${{ github.event.pull_request.number }}"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

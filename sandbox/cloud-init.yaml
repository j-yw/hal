#cloud-config
# =============================================================================
# Drop-in cloud-init for any VPS (Hetzner, DigitalOcean, AWS, etc.)
# =============================================================================
# Usage (Hetzner):
#   hcloud server create --name dev --type cx22 --image ubuntu-22.04 \
#     --ssh-key mine --user-data-from-file sandbox/cloud-init.yaml
#
# Usage (DigitalOcean):
#   doctl compute droplet create dev --size s-2vcpu-4gb --image ubuntu-22-04-x64 \
#     --ssh-keys <fingerprint> --user-data "$(cat sandbox/cloud-init.yaml)"
#
# After boot (~3 min), SSH in and everything is ready.
# =============================================================================

write_files:
  - path: /root/.env
    permissions: "0600"
    content: |
      # ── Fill in your values ──
      # ANTHROPIC_API_KEY=sk-ant-...
      # OPENAI_API_KEY=sk-...
      # GITHUB_TOKEN=ghp_...
      # GIT_USER_NAME=j-yw
      # GIT_USER_EMAIL=32629001+j-yw@users.noreply.github.com
      # TAILSCALE_AUTHKEY=tskey-auth-...
      # TAILSCALE_HOSTNAME=hal-dev

runcmd:
  # Run the universal bootstrap
  - |
    if [ -f /root/.env ]; then
      set -a
      . /root/.env
      set +a
    fi
    setup_url="${HAL_SETUP_URL:-https://raw.githubusercontent.com/ReScienceLab/hal/main/sandbox/setup.sh}"
    case "$setup_url" in
      https://raw.githubusercontent.com/*|https://github.com/*/raw/*)
        trusted_github_setup_url=true
        ;;
      *)
        trusted_github_setup_url=false
        ;;
    esac
    script_file=$(mktemp)
    header_file=""
    trap 'rm -f "$script_file" "$header_file"' EXIT
    if [ -n "${GITHUB_TOKEN:-}" ] && [ "$trusted_github_setup_url" = true ]; then
      header_file=$(mktemp)
      printf 'Authorization: Bearer %s\n' "$GITHUB_TOKEN" > "$header_file"
      curl -fsSL -H @"$header_file" "$setup_url" -o "$script_file" || exit 1
    else
      curl -fsSL "$setup_url" -o "$script_file" || exit 1
    fi
    bash "$script_file"
  # Start Tailscale if auth key is set
  - |
    if [ -f /root/.env ]; then
      set -a
      . /root/.env
      set +a
    fi
    if [ -n "${TAILSCALE_AUTHKEY:-}" ]; then
      tailscaled --tun=userspace-networking --statedir=/var/lib/tailscale &
      sleep 3
      tailscale up --authkey="$TAILSCALE_AUTHKEY" --ssh --hostname="${TAILSCALE_HOSTNAME:-hal-dev}"
    fi
